name: MLOps Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 steps/ model/ pipelines/ --max-line-length=120 --ignore=E501,W503,E402,W504

      - name: Verify pipeline imports
        run: |
          pip install zenml evidently
          python -c "from steps.drift_detection import detect_data_drift; print('Drift detection import OK')"
