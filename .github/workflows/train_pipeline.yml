name: MLOps Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 steps/ model/ pipelines/ --max-line-length=120 --ignore=E501,W503

      - name: Verify pipeline imports
        run: |
          python -c "from pipelines.training_pipeline import train_pipeline; print('Training pipeline import OK')"
          python -c "from pipelines.deployment_pipeline import continuous_deployment_pipeline; print('Deployment pipeline import OK')"
          python -c "from steps.drift_detection import detect_data_drift; print('Drift detection import OK')"
